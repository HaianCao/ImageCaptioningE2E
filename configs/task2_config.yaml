# ============================================================
# Task 2 Configuration: Relationship Classification
# ============================================================

task: "task2"

# ── Visual Backbone ────────────────────────────────────────
# Options: "resnet50", "resnet101", "efficientnet_b3",
#          "efficientnet_b5", "vit_base_16", "vit_large_16"
backbone:
  name: "resnet50"
  pretrained: true
  freeze_backbone: false
  freeze_epochs: 0
  feature_dim: 2048           # Per-region feature dim

# ── Dataset ────────────────────────────────────────────────
dataset:
  processed_dir: "data/processed/task2"
  feature_cache_dir: "data/features/task2"
  use_feature_cache: true

# ── Label Space ────────────────────────────────────────────
labels:
  relation_vocab_file: "data/processed/task2/relation_vocab.json"
  max_relations: 100          # Top-N most frequent relation types
  predicate_vocab_file: "data/processed/task2/predicate_vocab.json"

# ── Spatial Features ───────────────────────────────────────
spatial:
  use_spatial_features: true   # Append geometric features
  # Features: [x1,y1,x2,y2 (normalized)] x2 for each bbox + IoU + distance = 9 dims
  spatial_dim: 9

# ── Model Architecture ─────────────────────────────────────
model:
  # Fusion strategy: "concat", "add", "cross_attention"
  fusion_method: "concat"
  # Input dim = feature_dim * 2 + spatial_dim (if use_spatial_features)
  hidden_dim: 1024
  dropout: 0.4
  num_layers: 2               # MLP depth

# ── Loss ───────────────────────────────────────────────────
loss:
  label_smoothing: 0.1        # Smoothing for CrossEntropy

# ── Training Overrides ─────────────────────────────────────
training:
  batch_size: 64
  max_epochs: 35
  lr: 3.0e-4

# ── Data Augmentation ──────────────────────────────────────
augmentation:
  random_horizontal_flip: 0.5   # Flip both bboxes together
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
    hue: 0.05

# ── Evaluation ─────────────────────────────────────────────
eval:
  relation_top_k: [1, 3, 5]
  iou_threshold: 0.5         # Min IoU for a valid pair
