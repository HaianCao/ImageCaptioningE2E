# ============================================================
# Task 1 Configuration: Object & Attribute Classification
# ============================================================

task: "task1"  # Task identifier for the Task 1 pipeline

# ── Visual Backbone ────────────────────────────────────────
# Options: "resnet50", "resnet101", "efficientnet_b3",
#          "efficientnet_b5", "vit_base_16", "vit_large_16"
backbone:
  name: "resnet50"  # Backbone architecture used for feature extraction
  pretrained: true  # Load pretrained weights for the backbone
  freeze_backbone: false      # Freeze backbone weights during training when true
  freeze_epochs: 0            # Number of epochs to keep the backbone frozen before unfreezing
  feature_dim: 2048           # Output feature dimension produced by the backbone

# ── Dataset ────────────────────────────────────────────────
dataset:
  processed_dir: "data/processed/task1"  # Processed Task 1 annotations and vocabularies
  feature_cache_dir: "features"  # Relative cache folder for pre-extracted features
  use_feature_cache: true    # Read cached features instead of raw images

# ── Label Space ────────────────────────────────────────────
labels:
  object_vocab_file: "data/processed/task1/object_vocab.json"  # Object vocabulary file generated during preprocessing
  attribute_vocab_file: "data/processed/task1/attribute_vocab.json"  # Attribute vocabulary file generated during preprocessing
  max_objects: 300            # Keep the top-N most frequent object classes
  max_attributes: 200         # Keep the top-N most frequent attribute labels

# ── Model Architecture ─────────────────────────────────────
model:
  # Object head
  object_hidden_dim: 512  # Hidden width of the object classification MLP
  object_dropout: 0.3  # Dropout rate used in the object head
  object_num_layers: 2  # Number of linear layers in the object head

  # Attribute head (multi-label)
  attribute_hidden_dim: 512  # Hidden width of the attribute multi-label MLP
  attribute_dropout: 0.3  # Dropout rate used in the attribute head
  attribute_num_layers: 2  # Number of linear layers in the attribute head

# ── Loss Weights ───────────────────────────────────────────
loss:
  object_weight: 1.0          # Weight applied to object classification loss
  attribute_weight: 1.0       # Weight applied to attribute classification loss
  attribute_pos_weight: 5.0   # Positive-class weight for the attribute BCE loss

# ── Training Overrides ─────────────────────────────────────
training:
  batch_size: 128  # Batch size used by Task 1 DataLoaders
  max_epochs: 40  # Maximum Task 1 training epochs
  lr: 5.0e-4  # Learning rate for Task 1 optimizers

# ── Data Augmentation ──────────────────────────────────────
augmentation:
  resize_delta: 32  # Extra pixels added before random crop
  random_horizontal_flip: 0.5  # Probability of horizontally flipping the ROI
  color_jitter:
    enabled: true  # Enable or disable color jitter
    brightness: 0.2  # Brightness jitter magnitude
    contrast: 0.2  # Contrast jitter magnitude
    saturation: 0.2  # Saturation jitter magnitude
    hue: 0.1  # Hue jitter magnitude
  random_resized_crop: false   # Kept for compatibility; current pipeline uses fixed ROI crop
  random_erasing_p: 0.0  # Probability of applying random erasing

# ── Evaluation ─────────────────────────────────────────────
eval:
  object_top_k: [1, 3, 5]  # Top-k values reported for object accuracy
  attribute_threshold: 0.5    # Sigmoid threshold for converting attribute logits to labels
