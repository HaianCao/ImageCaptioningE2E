# ============================================================
# Attribute Configuration
# ============================================================

task: "attribute"
# This file is dedicated to the attribute pipeline.
# Keep this value as attribute so shared loaders resolve the correct task-specific settings.

# ── Backbone Runtime Flags ─────────────────────────────────
# The actual backbone architecture is selected by model.strategy.
# These flags only control how the selected backbone is initialized and trained.
backbone:
  # Load pretrained weights for the selected backbone.
  # Set false when training from scratch or when you want to avoid pretrained initialization.
  pretrained: true
  # Freeze the selected backbone during training.
  # Set true to train only the multilabel classification head.
  freeze_backbone: false

# ── Dataset ────────────────────────────────────────────────
dataset:
  # Directory containing processed attribute annotations and vocabularies.
  # This is usually a repository-relative path, but an absolute path also works.
  processed_dir: "data/processed/attribute"
  # Input representation for the cropped ROI before augmentation.
  # Supported canonical values:
  # - rgb: keep the ROI in RGB color.
  # - gray: convert to grayscale and expand back to 3 channels.
  # - contour: convert to a Canny edge map and expand back to 3 channels.
  # Accepted aliases:
  # - grayscale, grey -> gray
  # - edge, edges -> contour
  attribute_input_mode: "rgb"

# ── Label Space ────────────────────────────────────────────
labels:
  # Shared preprocessing cap for the object vocabulary used by task 1.
  max_objects: 300
  # Keep only the top-N most frequent attribute labels during preprocessing.
  max_attributes: 200

# ── Model Architecture ─────────────────────────────────────
model:
  # Registered attribute model strategy.
  # Supported values:
  # - baseline_cnn: ResNet-50 baseline preset.
  # - modern_cnn: ConvNeXtV2-Tiny preset and the recommended default.
  # - efficientnetv2_s: EfficientNetV2-S preset.
  # - transformer: Swin-Tiny preset.
  # Compatibility aliases:
  # - resnet50 -> baseline_cnn
  # - convnextv2_tiny -> modern_cnn
  # - swin_tiny_patch4_window7_224 -> transformer
  # The registry is extensible, so custom strategy names can be registered later.
  strategy: "modern_cnn"
  # Hidden width of the attribute multilabel MLP head.
  attribute_hidden_dim: 1024
  # Dropout rate used inside the attribute head.
  attribute_dropout: 0.2
  # Number of linear layers in the attribute head.
  # 1 means a single linear classifier on top of the encoder output.
  attribute_num_layers: 2

# ── Loss Weights ───────────────────────────────────────────
loss:
  # Scalar weight applied to the attribute classification loss.
  # Increase this if you want to emphasize attribute prediction relative to other objectives.
  attribute_weight: 1.0
  # Legacy positive-class weight retained for compatibility with older notebooks and configs.
  # The public trainer now derives the actual BCE weights from the training split automatically.
  attribute_pos_weight: 5.0

# ── Training Overrides ─────────────────────────────────────
training:
  # Batch size used by the attribute DataLoader.
  # Increase it if your GPU memory allows; reduce it for smaller cards.
  batch_size: 256
  # Number of DataLoader workers for attribute training.
  num_workers: 0
  # Pin host memory only when CUDA is available.
  pin_memory: true
  # Maximum number of training epochs.
  max_epochs: 40
  # Stop training after this many validation epochs without improvement.
  early_stopping_patience: 5
  # Maximum gradient norm used for clipping.
  gradient_clip_val: 1.0
  # Batch-step logging frequency; set 0 to disable per-step logs.
  log_every_n_steps: 0
  # Base learning rate for the attribute optimizer.
  lr: 5.0e-4
  # L2 regularization strength for AdamW.
  weight_decay: 1.0e-4

# ── Preprocessing ─────────────────────────────────────────
preprocessing:
  # Registered preprocessing preset for task 1.
  # Supported values:
  # - baseline_task1: canonical shared ROI preprocessing preset for task 1.
  # - baseline_object: alias of baseline_task1 kept for object-specific readability.
  # - baseline_attribute: alias of baseline_task1 kept for attribute-specific readability.
  # The registry can also accept custom names if you register another strategy later.
  strategy: "baseline_task1"
  # Extra pixels added before the random crop.
  # Larger values increase augmentation strength, but also change the crop context.
  resize_delta: 32
  # Probability of horizontally flipping the ROI.
  # Flipping is acceptable for attribute prediction because the label does not depend on orientation.
  random_horizontal_flip: 0.5
  color_jitter:
    # Enable or disable color jitter.
    # When false, the brightness/contrast/saturation/hue values below are ignored.
    enabled: false
    # Brightness jitter magnitude.
    brightness: 0.2
    # Contrast jitter magnitude.
    contrast: 0.2
    # Saturation jitter magnitude.
    saturation: 0.2
    # Hue jitter magnitude.
    hue: 0.1
  # Legacy compatibility flag kept for older notebooks and configs.
  # The public pipeline currently uses fixed ROI resize + crop and does not read this flag.
  random_resized_crop: false
  # Probability of random erasing after normalization.
  # Set to 0.0 to disable it.
  random_erasing_p: 0.0

# ── Evaluation ─────────────────────────────────────────────
eval:
  # Thresholding policy used to convert sigmoid outputs into binary attribute labels.
  # Supported values:
  # - fixed: use the fixed threshold below.
  # - dynamic: adjust the threshold per batch/score scale when the trainer supports it.
  attribute_threshold_mode: "fixed"
  # Sigmoid threshold used when attribute_threshold_mode is fixed.
  attribute_threshold: 0.5
  # Legacy scaling factor kept for compatibility with older thresholding modes.
  # The public pipeline ignores it when attribute_threshold_mode is fixed.
  attribute_threshold_scale: 0.5
  # Lower bound for dynamic thresholding.
  # Kept for compatibility even when not used.
  attribute_threshold_min: 0.05
  # Upper bound for dynamic thresholding.
  # Kept for compatibility even when not used.
  attribute_threshold_max: 0.95
