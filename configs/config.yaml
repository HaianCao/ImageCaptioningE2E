# ============================================================
# Global Configuration
# ============================================================

# Free-form experiment label written to logs, checkpoints, and reports.
# Use any descriptive string; for example, "ImageCaptioningE2E", "debug_run", or "ablation_v2".
project_name: "ImageCaptioningE2E"

# Global RNG seed used for sampling, split assignment, augmentation order, and model initialization.
# Any integer is valid; reusing the same seed makes runs easier to reproduce.
seed: 42

# Preferred execution device.
# Supported values:
# - cuda: request GPU execution; the runtime falls back to cpu if CUDA is unavailable.
# - cpu: force CPU execution even when a GPU is available.
# Any string starting with cuda is treated as a GPU request and normalized to cuda.
device: "cuda"

# ── Paths ──────────────────────────────────────────────────
paths:
  # Root folder for all dataset artifacts.
  # Relative paths are resolved from the repository root, but absolute paths also work.
  data_dir: "data"
  # Downloaded raw Visual Genome metadata and images.
  raw_dir: "data/raw"
  # Preprocessed annotations and split files.
  processed_dir: "data/processed"
  # Legacy feature cache root kept for compatibility with older notebooks and experiments.
  # The public training pipelines no longer depend on pre-extracted features.
  feature_dir: "data/features"
  # Directory for saved model checkpoints.
  checkpoint_dir: "checkpoints"
  # Directory for training logs and TensorBoard outputs.
  log_dir: "logs"

# ── HuggingFace Dataset ────────────────────────────────────
dataset:
  # Hugging Face dataset repository identifier in owner/dataset format.
  # Default: ranjaykrishna/visual_genome.
  repo_id: "ranjaykrishna/visual_genome"
  # Local Hugging Face cache directory for downloaded metadata.
  cache_dir: "data/raw/hf_cache"
  # Download destination for Visual Genome image files.
  image_dir: "data/raw/images"

# ── Image Processing ───────────────────────────────────────
image:
  # Final ROI crop size fed to the encoder.
  roi_size: 224
  # Channel-wise normalization mean in RGB order.
  # These values should match the pretrained backbone's expected ImageNet normalization.
  mean: [0.485, 0.456, 0.406]
  # Channel-wise normalization standard deviation in RGB order.
  std: [0.229, 0.224, 0.225]

# ── Data Split ─────────────────────────────────────────────
split:
  # Proportion of data assigned to the training split.
  train: 0.80
  # Proportion of data assigned to the validation split.
  val: 0.10
  # Proportion of data assigned to the test split.
  test: 0.10

# ── Runtime / Notebook Controls ────────────────────────────
pipeline:
  # Pipeline scope for the notebook/launcher entry point.
  # Supported values:
  # - object: run only the object pipeline.
  # - attribute: run only the attribute pipeline.
  # - relation: run only the relation pipeline.
  # - all: run object, attribute, and relation sequentially.
  # - e2e: run the lightweight end-to-end wrapper over the trained checkpoints.
  # Legacy aliases retained for older notebook entry points:
  # - task1: legacy task-1 workflow alias.
  # - task2: legacy task-2 workflow alias.
  # - both: legacy alias for running the full multi-task flow.
  training_mode: "all"
  # Download missing metadata and images before preprocessing.
  # Set this to false only when data/raw already contains the required files.
  download_data: true

sampling:
  # When true, sample image IDs first and then split the sampled subset.
  # When false, the pipeline uses the full split annotations.
  strict_mode: false
  # Number of image IDs selected before splitting when strict_mode is enabled.
  sample_size: 200
  # Seed used for deterministic sampling and split assignment inside strict mode.
  seed: 42
  # Policy for downloading images referenced by the sampled or processed splits.
  # Supported values:
  # - none: do not download images automatically.
  # - sample: download only the selected sample image IDs.
  # - all: download every referenced image ID.
  image_download_mode: "all"
  # Optional per-split sample cap for debugging.
  # Use null to disable the cap and keep all samples.
  max_samples: null
